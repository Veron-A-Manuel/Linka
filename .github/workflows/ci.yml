name: CI — Linka

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD || 'root' }}
          MYSQL_DATABASE: linka_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run health check test
        working-directory: backend
        run: |
          cat > .env <<EOF
          PORT=3005
          NODE_ENV=test
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_NOME=linka_test
          DB_UTILIZADOR=root
          DB_PASSWORD=${{ secrets.DB_PASSWORD || 'root' }}
          JWT_SECRET=test-secret-key-for-ci
          JWT_EXPIRA_EM=15m
          JWT_REFRESH_SECRET=test-refresh-secret-ci
          JWT_REFRESH_EXPIRA_EM=7d
          REDIS_HOST=localhost
          REDIS_PORT=6379
          EOF
        shell: bash

      - name: Start server
        working-directory: backend
        run: |
          timeout 10 node server.js &
          sleep 5
          curl -f http://localhost:3005/api/saude || exit 1
        env:
          NODE_ENV: test

      - name: Verify API health
        run: |
          curl -sf http://localhost:3005/api/saude | grep -q '"sucesso":true' && echo "API OK" || exit 1

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: echo "Ready to deploy — add your hosting provider steps here"
