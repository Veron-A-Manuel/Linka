<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linka Admin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 font-family=%22sans-serif%22 font-weight=%22bold%22 fill=%22%23004643%22>L</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/admin-app.css">
</head>
<body class="vendedor-app">

    <!-- Sidebar (Stitch) -->
    <aside class="v-sidebar">
        <div class="v-sidebar-header">
            <a href="#" class="v-logo">LINKA. <span class="admin-badge">Admin</span></a>
        </div>
        
        <nav class="v-nav">
            <a class="v-nav-item active" onclick="appAdmin.navegar('dashboard')" id="nav-dashboard">
                <span class="material-symbols-outlined">monitoring</span> Dashboard
            </a>
            <a class="v-nav-item" onclick="appAdmin.navegar('utilizadores')" id="nav-utilizadores">
                <span class="material-symbols-outlined">group</span> Utilizadores
            </a>
            <a class="v-nav-item" onclick="appAdmin.navegar('vendedores')" id="nav-vendedores">
                <span class="material-symbols-outlined">store</span> Vendedores
            </a>
            <a class="v-nav-item" onclick="appAdmin.navegar('denuncias')" id="nav-denuncias">
                <span class="material-symbols-outlined">flag</span> Denúncias
                <span class="admin-badge-count" id="badgeDenuncias" style="display:none;">0</span>
            </a>
            <a class="v-nav-item" onclick="appAdmin.navegar('sancoes')" id="nav-sancoes">
                <span class="material-symbols-outlined">gavel</span> Sanções
            </a>
            <a class="v-nav-item" onclick="appAdmin.navegar('produtos')" id="nav-produtos">
                <span class="material-symbols-outlined">inventory_2</span> Produtos
            </a>
            <a class="v-nav-item" onclick="appAdmin.navegar('anti-spam')" id="nav-anti-spam">
                <span class="material-symbols-outlined">shield</span> Anti-Spam
            </a>
        </nav>

        <div style="padding: 16px;">
            <button class="v-btn v-btn-outline" style="width: 100%; text-align: left; display: flex; gap: 10px; align-items: center;" onclick="appAdmin.fazerLogout()">
                <span class="material-symbols-outlined">logout</span> Sair
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="v-main">
        <header class="v-topbar">
            <div class="v-topbar-title" id="topbarTitle">Dashboard Admin</div>
            <div class="v-topbar-actions">
                <div style="width: 40px; height: 40px; border-radius: 50%; background: #dc2626; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer;" id="avatarAdmin">
                    A
                </div>
            </div>
        </header>

        <div class="v-content" id="adminContent">
            <div class="spinner-linka" style="margin: 40px auto;"></div>
        </div>
    </main>

    <!-- Bottom Navigation Mobile (Stitch) -->
    <nav class="v-bottom-nav" id="aBottomNav">
        <a class="v-bottom-nav-item active" onclick="appAdmin.navegar('dashboard')" id="bnav-dashboard">
            <span class="material-symbols-outlined">monitoring</span>
            <span>Painel</span>
        </a>
        <a class="v-bottom-nav-item" onclick="appAdmin.navegar('utilizadores')" id="bnav-utilizadores">
            <span class="material-symbols-outlined">group</span>
            <span>Users</span>
        </a>
        <a class="v-bottom-nav-item" onclick="appAdmin.navegar('vendedores')" id="bnav-vendedores">
            <span class="material-symbols-outlined">store</span>
            <span>Lojas</span>
        </a>
        <a class="v-bottom-nav-item" onclick="appAdmin.navegar('denuncias')" id="bnav-denuncias">
            <span class="material-symbols-outlined">flag</span>
            <span>Denúncias</span>
        </a>
        <a class="v-bottom-nav-item" onclick="appAdmin.navegar('sancoes')" id="bnav-sancoes">
            <span class="material-symbols-outlined">gavel</span>
            <span>Sanções</span>
        </a>
        <a class="v-bottom-nav-item" onclick="appAdmin.navegar('produtos')" id="bnav-produtos">
            <span class="material-symbols-outlined">inventory_2</span>
            <span>Produtos</span>
        </a>
        <a class="v-bottom-nav-item" onclick="appAdmin.navegar('anti-spam')" id="bnav-anti-spam">
            <span class="material-symbols-outlined">shield</span>
            <span>Anti-Spam</span>
        </a>
    </nav>

    <!-- Modal Genérico -->
    <div class="modal-overlay" id="modalAdmin">
        <div class="modal-container modal-detalhes-conteudo" style="max-width: 600px;">
            <button class="btn-fechar-modal" aria-label="Fechar" onclick="appAdmin.fecharModal()">
                <span class="material-symbols-outlined">close</span>
            </button>
            <div id="modalAdminConteudo"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="../assets/js/admin-app.js"></script>
</body>
</html>
