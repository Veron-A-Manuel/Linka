version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-linka_root_2026}
      MYSQL_DATABASE: ${DB_NOME:-linka_db}
      MYSQL_USER: ${DB_UTILIZADOR:-linka}
      MYSQL_PASSWORD: ${DB_PASSWORD:-linka_root_2026}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3005}:3005"
    environment:
      PORT: 3005
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 3306
      DB_NOME: ${DB_NOME:-linka_db}
      DB_UTILIZADOR: ${DB_UTILIZADOR:-linka}
      DB_PASSWORD: ${DB_PASSWORD:-linka_root_2026}
      JWT_SECRET: ${JWT_SECRET:-mude-esta-chave-em-producao}
      JWT_EXPIRA_EM: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-outra-chave-secreta}
      JWT_REFRESH_EXPIRA_EM: 7d
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
  uploads_data:
